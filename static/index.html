<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>localchat</title>
<script src="marked.min.js"></script>
<style>
  body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
  #log { max-width: 720px; margin: 0 auto; padding: 24px 16px 120px; }
  .msg { margin: 14px 0; display: flex; }
  .msg.you { justify-content: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 14px; max-width: 80%; }
  .you .bubble { background: #2563eb; color: #fff; }
  .bot .bubble { background: #fff; border: 1px solid #e4e4e7; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble pre { background: #f4f4f5; padding: 10px; border-radius: 8px; overflow-x: auto; }
  .bubble code { font-family: ui-monospace, monospace; font-size: 13px; }
  #bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e4e4e7; }
  #bar form { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; padding: 12px 16px; }
  #q { flex: 1; padding: 10px 12px; border: 1px solid #d4d4d8; border-radius: 10px; font-size: 15px; }
  button { padding: 0 18px; border: 0; border-radius: 10px; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; transition: background .15s, opacity .15s, transform .1s; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  button:active:not(:disabled) { transform: scale(.96); }
  button:disabled { opacity: .5; cursor: default; }
  .msg { animation: pop .2s ease-out; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .typing { display: inline-flex; gap: 4px; padding: 2px 0; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #a1a1aa; animation: blink 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-4px); } }
</style>
</head>
<body>
<div id="log"></div>
<div id="bar">
  <form id="form">
    <input id="q" placeholder="message" autocomplete="off" autofocus>
    <button id="send">send</button>
  </form>
</div>
<script>
const log = document.getElementById("log");
const form = document.getElementById("form");
const q = document.getElementById("q");
const send = document.getElementById("send");
const history = [];

function add(role, text) {
  const row = document.createElement("div");
  row.className = "msg " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (role === "bot") bubble.innerHTML = marked.parse(text);
  else bubble.textContent = text;
  row.appendChild(bubble);
  log.appendChild(row);
  window.scrollTo(0, document.body.scrollHeight);
  return bubble;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = q.value.trim();
  if (!text) return;
  q.value = "";
  send.disabled = true;
  add("you", text);
  history.push({ role: "user", content: text });
  const bubble = add("bot", "");
  bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    const data = await res.json();
    if (data.error) {
      bubble.textContent = "error: " + data.error;
    } else {
      bubble.innerHTML = marked.parse(data.reply);
      history.push({ role: "assistant", content: data.reply });
    }
  } catch (err) {
    bubble.textContent = "error: " + err.message;
  }
  send.disabled = false;
  q.focus();
  window.scrollTo(0, document.body.scrollHeight);
});
</script>
</body>
</html>
